*{box-sizing:border-box}
html,body{margin:0;height:100%;background:#fff;font-family:var(--f)}
body{display:flex;align-items:center;justify-content:center;padding:24px}
.lg{width:100%;max-width:380px;border:1px solid var(--b1);border-radius:3px;padding:26px 26px 22px;text-align:center}

form{display:flex;flex-direction:column;gap:12px;text-align:left}
label{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);display:flex;flex-direction:column;gap:5px}
input{font-family:var(--f);font-size:14px;color:#111;padding:9px 11px;border:1px solid var(--line);border-radius:3px;background:#fff;outline:none}
input:focus{border-color:var(--b1)}
button{font-family:var(--f);font-size:13px;font-weight:600;letter-spacing:.05em;padding:10px;border:1px solid var(--b1);background:var(--b1);color:#fff;border-radius:3px;cursor:pointer;margin-top:4px;transition:.15s}
button:hover{background:#2f5d8f}button:disabled{opacity:.6;cursor:default}
.err{min-height:16px;font-size:12px;color:var(--red);text-align:center;font-weight:600}
.foot{margin-top:18px;font-size:10.5px;color:var(--faint);line-height:1.5}

function b2u(b){var s=atob(b),a=new Uint8Array(s.length);for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function dec(pw){
  var data=b2u(BLOB),salt=data.slice(0,16),iv=data.slice(16,28),ct=data.slice(28);
  var km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  var key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);

}
