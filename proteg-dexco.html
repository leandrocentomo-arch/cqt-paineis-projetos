const WL=['l.centomo@cqt-br.com','leandro.centomo-ext@dex.co','gustavo.saralegui@dex.co','angelo.andrade@dex.co'];
const ITER=200000;
async function abrir(){
 const em=document.getElementById('em').value.trim().toLowerCase();
 const pw=document.getElementById('pw').value;
 const err=document.getElementById('err');
 if(!WL.includes(em)){err.textContent='E-mail não autorizado.';err.style.display='block';return;}
 try{
  const raw=Uint8Array.from(atob(BLOB),c=>c.charCodeAt(0));
  const salt=raw.slice(0,16), iv=raw.slice(16,28), ct=raw.slice(28);
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  const html=new TextDecoder().decode(pt);
  document.open();document.write(html);document.close();
 }catch(e){err.textContent='Senha incorreta.';err.style.display='block';}
}
document.getElementById('go').onclick=abrir;
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')abrir();});
</script></body></html>
